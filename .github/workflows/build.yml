name: Build Kernel

on:
  workflow_dispatch:
    inputs:
      android_version:
        description: 'Android version'
        required: true
        default: '16'
        type: choice
        options:
          - '16'
          - '15'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Maximize disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc \
            /usr/local/share/boost /opt/hostedtoolcache
          sudo apt-get clean
          df -h /

      - name: Checkout
        uses: actions/checkout@v4

      - name: Build kernel
        run: bash build_android${{ inputs.android_version }}.sh

      - name: Upload Image
        uses: actions/upload-artifact@v4
        with:
          name: kernel-image-android${{ inputs.android_version }}
          path: kernel_workspace/kernel_platform/common/out/arch/arm64/boot/Image
          compression-level: 9
